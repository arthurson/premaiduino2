<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プリメイドAI 控制器 (MV修正/LOG+GYRO複製)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        body {
            background: #1a1a2e;
            color: #fff;
            margin: 0;
            padding: 20px;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            max-width: 1800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: 100%;
            gap: 10px;
        }
        h1 {
            color: #00d4ff;
            text-align: center;
            margin: 0 0 5px 0;
            font-size: 1.8em;
        }
        h1 small {
            font-size: 14px;
            color: #888;
            display: block;
        }

        .top-control-bar {
            background: #16213e;
            border-radius: 4px;
            padding: 10px 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            border: 1px solid #0f3460;
        }
        .btn {
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: 0.2s;
            white-space: nowrap;
        }
        .btn:hover {
            background: #00b8e6;
            transform: scale(1.02);
        }
        .btn-danger {
            background: #ff4444;
            color: white;
        }
        .btn-success {
            background: #00cc66;
            color: white;
        }
        .btn-warning {
            background: #ffaa00;
            color: black;
        }
        .btn-home {
            background: #ffaa00;
            color: black;
        }
        .btn-free {
            background: #9b59b6;
            color: white;
        }
        .btn-primary {
            background: #1971c2;
            color: white;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status {
            background: #0f3460;
            padding: 5px 15px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            margin-left: auto;
        }
        .selected-servo-hint {
            background: #ffaa00;
            color: #1a1a2e;
            padding: 5px 15px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 13px;
        }
        .separator {
            width: 1px;
            height: 28px;
            background: #0f3460;
            margin: 0 5px;
        }
        .mode-selector {
            display: flex;
            gap: 5px;
            background: #0f3460;
            padding: 3px;
            border-radius: 4px;
        }
        .mode-btn {
            background: transparent;
            color: #aaa;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .mode-btn.active {
            background: #00d4ff;
            color: #1a1a2e;
            font-weight: bold;
        }

        .main-layout {
            display: flex;
            gap: 12px;
            flex: 1;
            min-height: 0;
        }

        .robot-diagram {
            width: 180px;
            background: #16213e;
            border-radius: 4px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .part-button {
            width: 100%;
            padding: 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            text-align: center;
            transition: 0.2s;
            color: white;
        }
        .part-button.head {
            background: #9b59b6;
        }
        .part-button.hand {
            background: #3498db;
        }
        .part-button.leg {
            background: #e67e22;
        }
        .part-button.active {
            border: 2px solid #00d4ff;
            box-shadow: 0 0 10px #00d4ff;
        }

        .control-panel {
            flex: 1;
            background: #16213e;
            border-radius: 4px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #0f3460;
        }
        .panel-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #00d4ff;
        }
        .panel-meta {
            background: #0f3460;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75em;
            color: #aaa;
        }

        .servo-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .split-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            height: 100%;
        }
        .split-left, .split-right {
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .split-title {
            color: #888;
            font-size: 0.85em;
            text-align: center;
            padding: 4px;
            background: #0f3460;
            border-radius: 4px;
        }

        .servo-row {
            background: #0f3460;
            border-radius: 4px;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 4px solid;
            transition: 0.2s;
        }
        .servo-row.MV {
            border-left-color: #00d4ff;
        }
        .servo-row.HV {
            border-left-color: #ffaa00;
        }
        .servo-row.active-inc {
            background: #00cc66 !important;
        }
        .servo-row.active-dec {
            background: #ff4444 !important;
        }
        .servo-row.selected {
            outline: 2px solid #00d4ff;
        }

        .servo-info {
            flex: 2;
            min-width: 100px;
        }
        .servo-name {
            font-weight: bold;
            font-size: 0.9em;
        }
        .servo-detail {
            font-size: 0.7em;
            color: #aaa;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .binary-id {
            background: #00d4ff22;
            color: #00d4ff;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .home-star {
            color: #ffaa00;
            font-weight: bold;
        }
        .shortkey-badge {
            background: #00d4ff;
            color: #1a1a2e;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .shortkey-badge:hover {
            background: #ffaa00;
        }

        .controls-wrapper {
            flex: 3;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        .angle-control, .speed-control {
            display: flex;
            align-items: center;
            gap: 3px;
            background: #1a1a2e;
            padding: 2px 5px;
            border-radius: 4px;
        }
        .angle-control {
            border-left: 2px solid #00d4ff;
        }
        .speed-control {
            border-left: 2px solid #ffaa00;
        }
        .angle-label, .speed-label {
            font-size: 0.65em;
            font-weight: bold;
        }
        .angle-label { color: #00d4ff; }
        .speed-label { color: #ffaa00; }
        .btn-angle, .btn-speed {
            background: #0f3460;
            border: none;
            width: 22px;
            height: 22px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-angle {
            color: #00d4ff;
        }
        .btn-speed {
            color: #ffaa00;
        }
        .btn-angle:hover {
            background: #00d4ff;
            color: #1a1a2e;
        }
        .btn-speed:hover {
            background: #ffaa00;
            color: #1a1a2e;
        }
        .angle-input, .speed-input {
            background: #1a1a2e;
            border: 1px solid;
            border-radius: 4px;
            padding: 3px 3px;
            font-family: monospace;
            font-size: 0.85em;
            text-align: center;
            outline: none;
            width: 60px;
        }
        .angle-input {
            color: #00d4ff;
            border-color: #00d4ff;
        }
        .speed-input {
            color: #ffaa00;
            border-color: #ffaa00;
            width: 45px;
        }

        .bottom-dual {
            display: flex;
            gap: 12px;
            height: 180px;
            flex-shrink: 0;
        }
        .gyro-section, .log-section {
            flex: 1;
            background: #16213e;
            border-radius: 4px;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }
        .gyro-header, .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .gyro-title {
            color: #9b59b6;
            font-weight: bold;
            font-size: 0.95em;
        }
        .log-title {
            color: #00d4ff;
            font-weight: bold;
            font-size: 0.95em;
        }
        .gyro-content, .log-content {
            flex: 1;
            background: #0f3460;
            border-radius: 4px;
            padding: 8px;
            font-family: monospace;
            font-size: 11px;
            overflow-y: auto;
            line-height: 1.4;
        }
        .gyro-content {
            color: #9b59b6;
        }
        .log-content {
            color: #00d4ff;
        }
        .log-sent { color: #00d4ff; }
        .log-received { color: #00cc66; }
        .copy-btn {
            background: #0f3460;
            color: #aaa;
            border: none;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        .copy-btn:hover {
            background: #00d4ff;
            color: #1a1a2e;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0f3460;
        }
        ::-webkit-scrollbar-thumb {
            background: #00d4ff;
            border-radius: 0px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🤖 プリメイドAI 控制器 <small>binaryID: HV1-14, MV21-31 / LOG+GYRO可複製</small></h1>

    <div class="top-control-bar">
        <button class="btn" id="connectBtn">🔌 連接</button>
        <button class="btn btn-danger" id="disconnectBtn" disabled>❌ 斷開</button>
        <button class="btn btn-success" id="scanBtn">🔍 掃描</button>
        <span class="separator"></span>

        <div class="mode-selector">
            <button class="mode-btn active" id="modeASCII">📝 ASCII</button>
            <button class="mode-btn" id="modeICS">🔢 ICS 二進制</button>
        </div>
        <span class="separator"></span>

        <button class="btn btn-home" id="homeAllBtn">🏠 全部HOME</button>
        <button class="btn btn-home" id="homeHeadBtn">👤 頭HOME</button>
        <button class="btn btn-home" id="homeHandBtn">🖐️ 手HOME</button>
        <button class="btn btn-home" id="homeLegBtn">🦶 腳HOME</button>
        <span class="separator"></span>

        <button class="btn btn-free" id="freeHeadBtn">💤 頭脫力</button>
        <button class="btn btn-free" id="freeHandBtn">💤 雙手脫力</button>
        <button class="btn btn-free" id="freeLegBtn">💤 雙腳脫力</button>
        <button class="btn btn-primary" id="gyroBtn">📊 陀螺儀</button>

        <div class="status" id="status">⚡ 未連接</div>
        <div class="selected-servo-hint" id="selectedHint">⚡ 未選中伺服</div>
    </div>

    <div class="main-layout">
        <div class="robot-diagram">
            <button class="part-button head active" id="navHead">👤 頭部</button>
            <button class="part-button hand" id="navHand">🖐️ 手部</button>
            <button class="part-button leg" id="navLeg">🦶 腳部</button>
        </div>

        <div class="control-panel" id="controlPanel">
            <div class="panel-header">
                <span class="panel-title" id="panelTitle">👤 頭部控制</span>
                <span class="panel-meta" id="panelMeta"></span>
            </div>
            <div class="servo-container" id="servoContainer"></div>
        </div>
    </div>

    <div class="bottom-dual">
        <div class="gyro-section">
            <div class="gyro-header">
                <div class="gyro-title">📊 陀螺儀</div>
                <div>
                    <button class="copy-btn" id="copyGyroBtn">📋 複製</button>
                    <button class="copy-btn" id="clearGyroBtn">清除</button>
                </div>
            </div>
            <div class="gyro-content" id="gyroContent">等待陀螺儀數據…</div>
        </div>
        <div class="log-section">
            <div class="log-header">
                <div class="log-title">📋 通訊記錄</div>
                <div>
                    <button class="copy-btn" id="copyLogBtn">📋 複製</button>
                    <button class="copy-btn" id="clearLogBtn">清除</button>
                </div>
            </div>
            <div class="log-content" id="logContent">[系統] 控制器啟動 (HOME速度30)</div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ========== 新homepoint + 新binaryID (HV:1-14, MV:21-31) ==========
        const SERVOS = [
            // 頭 (MV) - ID 21-23
            { id:21, nameZh:'頭部俯仰', min:7200, max:8400, home:7500, group:'MV', part:'head', shortKey:{ dec:'q', inc:'w' }, speed:30 },
            { id:22, nameZh:'頭部左右', min:5000, max:10000, home:7500, group:'MV', part:'head', shortKey:{ dec:'e', inc:'r' }, speed:30 },
            { id:23, nameZh:'頭部萌',   min:6900, max:8100, home:7500, group:'MV', part:'head', shortKey:{ dec:'t', inc:'y' }, speed:30 },
            // 右手 (HV1, MV24,26,28,30)
            { id:1, nameZh:'右肩 pitch', min:4300, max:11500, home:10200, group:'HV', part:'rhand', shortKey:{ dec:'q', inc:'w' }, speed:30 },
            { id:24, nameZh:'右肩 roll',  min:7450, max:10350, home:9800, group:'MV', part:'rhand', shortKey:{ dec:'e', inc:'r' }, speed:30 },
            { id:26, nameZh:'右上臂 yaw', min:4000, max:11000, home:7500, group:'MV', part:'rhand', shortKey:{ dec:'t', inc:'y' }, speed:30 },
            { id:28, nameZh:'右肘 pitch', min:7100, max:11000, home:7500, group:'MV', part:'rhand', shortKey:{ dec:'u', inc:'i' }, speed:30 },
            { id:30, nameZh:'右手腕 yaw', min:3500, max:11500, home:5000, group:'MV', part:'rhand', shortKey:{ dec:'o', inc:'p' }, speed:30 },
            // 左手 (HV2, MV25,27,29,31)
            { id:2, nameZh:'左肩 pitch', min:3500, max:10700, home:4700, group:'HV', part:'lhand', shortKey:{ dec:'a', inc:'s' }, speed:30 },
            { id:25, nameZh:'左肩 roll',  min:4550, max:7550, home:5200, group:'MV', part:'lhand', shortKey:{ dec:'d', inc:'f' }, speed:30 },
            { id:27, nameZh:'左上臂 yaw', min:4000, max:11000, home:7500, group:'MV', part:'lhand', shortKey:{ dec:'g', inc:'h' }, speed:30 },
            { id:29, nameZh:'左肘 pitch', min:4000, max:7900, home:7500, group:'MV', part:'lhand', shortKey:{ dec:'j', inc:'k' }, speed:30 },
            { id:31, nameZh:'左手腕 yaw', min:3500, max:11500, home:10000, group:'MV', part:'lhand', shortKey:{ dec:'l', inc:';' }, speed:30 },
            // 右腳 HV (3,5,7,9,11,13)
            { id:3, nameZh:'右髖 yaw',   min:6530, max:9030, home:7780, group:'HV', part:'rleg', shortKey:{ dec:'q', inc:'w' }, speed:30 },
            { id:5, nameZh:'右髖 roll',  min:6700, max:8300, home:7400, group:'HV', part:'rleg', shortKey:{ dec:'e', inc:'r' }, speed:30 },
            { id:7, nameZh:'右大腿 pitch', min:4700, max:10200, home:7500, group:'HV', part:'rleg', shortKey:{ dec:'t', inc:'y' }, speed:30 },
            { id:9, nameZh:'右膝 pitch', min:3950, max:7600, home:7500, group:'HV', part:'rleg', shortKey:{ dec:'u', inc:'i' }, speed:30 },
            { id:11, nameZh:'右踝 pitch', min:5700, max:8300, home:7500, group:'HV', part:'rleg', shortKey:{ dec:'o', inc:'p' }, speed:30 },
            { id:13, nameZh:'右踝 roll',  min:6800, max:9150, home:7825, group:'HV', part:'rleg', shortKey:{ dec:'[', inc:']' }, speed:30 },
            // 左腳 HV (4,6,8,10,12,14)
            { id:4, nameZh:'左髖 yaw',   min:6250, max:8750, home:7500, group:'HV', part:'lleg', shortKey:{ dec:'a', inc:'s' }, speed:30 },
            { id:6, nameZh:'左髖 roll',  min:6700, max:8300, home:7600, group:'HV', part:'lleg', shortKey:{ dec:'d', inc:'f' }, speed:30 },
            { id:8, nameZh:'左大腿 pitch', min:4700, max:10200, home:7500, group:'HV', part:'lleg', shortKey:{ dec:'g', inc:'h' }, speed:30 },
            { id:10, nameZh:'左膝 pitch', min:7400, max:11050, home:7500, group:'HV', part:'lleg', shortKey:{ dec:'j', inc:'k' }, speed:30 },
            { id:12, nameZh:'左踝 pitch', min:6750, max:9350, home:7550, group:'HV', part:'lleg', shortKey:{ dec:'l', inc:';' }, speed:30 },
            { id:14, nameZh:'左踝 roll',  min:6200, max:8450, home:7450, group:'HV', part:'lleg', shortKey:{ dec:'\'', inc:'\\' }, speed:30 }
        ];

        // ========== 全域變數 ==========
        let currentPart = 'head';
        let port = null, reader = null;
        let currentAngles = {};
        let selectedServo = null;
        let pressedKeys = new Set();
        let repeatTimer = null, activeServo = null, activeDelta = 0, isKeyHeld = false;
        let currentMode = 'ASCII';

        SERVOS.forEach(s => { currentAngles[`${s.group}_${s.id}`] = s.home; });

        // ========== 輔助函式 ==========
        function addLog(msg, type='info') {
            const log = document.getElementById('logContent');
            const time = new Date().toLocaleTimeString();
            const cls = type==='sent'?'log-sent':type==='received'?'log-received':'';
            log.innerHTML += `<div><span class="${cls}">[${time}] ${msg}</span></div>`;
            log.scrollTop = log.scrollHeight;
            if(log.children.length>100) log.removeChild(log.firstChild);
        }
        function addGyro(msg) {
            const g = document.getElementById('gyroContent');
            const time = new Date().toLocaleTimeString();
            g.innerHTML += `<div>[${time}] ${msg}</div>`;
            g.scrollTop = g.scrollHeight;
            if(g.children.length>30) g.removeChild(g.firstChild);
        }
        function delay(ms) { return new Promise(r=>setTimeout(r,ms)); }

        // ========== 模式切換 ==========
        document.getElementById('modeASCII').addEventListener('click', ()=>{
            currentMode = 'ASCII';
            document.getElementById('modeASCII').classList.add('active');
            document.getElementById('modeICS').classList.remove('active');
            addLog('🔤 切換至 ASCII 模式');
        });
        document.getElementById('modeICS').addEventListener('click', ()=>{
            currentMode = 'ICS';
            document.getElementById('modeICS').classList.add('active');
            document.getElementById('modeASCII').classList.remove('active');
            addLog('🔢 切換至 ICS 二進制模式');
        });

        // ========== 發送指令 (根據模式) ==========
        async function sendCommand(group, id, angle, speed) {
            if(!port) { addLog('❌ 未連接','error'); return false; }
            try {
                const writer = port.writable.getWriter();
                if(currentMode === 'ASCII') {
                    const cmd = `S ${group} ${id} ${angle} ${speed}`;
                    await writer.write(new TextEncoder().encode(cmd + '\n'));
                    addLog('📤 ' + cmd, 'sent');
                } else {
                    const binaryId = id;
                    const high = (angle >> 7) & 0x7F;
                    const low = angle & 0x7F;
                    const packet = [0x07, 0x18, speed, binaryId, high, low];
                    let xor = 0;
                    for(let b of packet) xor ^= b;
                    packet.push(xor);
                    await writer.write(new Uint8Array(packet));
                    const hex = packet.map(b=>b.toString(16).padStart(2,'0').toUpperCase()).join(' ');
                    addLog('📤 [ICS] ' + hex, 'sent');
                }
                writer.releaseLock();
                return true;
            } catch(e) { addLog(`❌ 發送失敗 ${e.message}`,'error'); return false; }
        }

        // ========== 多軸指令 ==========
        async function sendMulti(servoList, speed) {
            if(!port) { alert('請先連接'); return; }
            try {
                const writer = port.writable.getWriter();
                if(currentMode === 'ASCII') {
                    let cmd = `S MULTI ${speed} ${servoList.length}`;
                    for(let s of servoList) {
                        cmd += ` ${s.group}${s.id} ${s.angle}`;
                    }
                    await writer.write(new TextEncoder().encode(cmd + '\n'));
                    addLog('📤 ' + cmd, 'sent');
                } else {
                    const packet = [4 + servoList.length * 3, 0x18, speed];
                    for(let s of servoList) {
                        packet.push(s.id);
                        packet.push((s.angle >> 7) & 0x7F);
                        packet.push(s.angle & 0x7F);
                    }
                    let xor = 0;
                    for(let b of packet) xor ^= b;
                    packet.push(xor);
                    await writer.write(new Uint8Array(packet));
                    const hex = packet.map(b=>b.toString(16).padStart(2,'0').toUpperCase()).join(' ');
                    addLog('📤 [ICS] ' + hex, 'sent');
                }
                writer.releaseLock();
            } catch(e) { addLog(`❌ 發送失敗 ${e.message}`,'error'); }
        }

        // ========== 渲染 ==========
        function renderPanel(part) {
            currentPart = part;
            document.querySelectorAll('.part-button').forEach(b=>b.classList.remove('active'));
            document.getElementById(`nav${part.charAt(0).toUpperCase()+part.slice(1)}`).classList.add('active');

            let title = part==='head'? '👤 頭部控制' : part==='hand'? '🖐️ 手部控制' : '🦶 腳部控制';
            document.getElementById('panelTitle').innerText = title;

            let html = '';
            if (part === 'head') {
                html = '<div class="split-left" style="grid-column:span2;">';
                SERVOS.filter(s=>s.part==='head').forEach(s=> html += renderServoRow(s));
                html += '</div>';
            } else if (part === 'hand') {
                html = '<div class="split-panel"><div class="split-left"><div class="split-title">👉 右手</div>';
                SERVOS.filter(s=>s.part==='rhand').forEach(s=> html += renderServoRow(s));
                html += '</div><div class="split-right"><div class="split-title">👈 左手</div>';
                SERVOS.filter(s=>s.part==='lhand').forEach(s=> html += renderServoRow(s));
                html += '</div></div>';
            } else {
                html = '<div class="split-panel"><div class="split-left"><div class="split-title">🦶 右腳</div>';
                SERVOS.filter(s=>s.part==='rleg').forEach(s=> html += renderServoRow(s));
                html += '</div><div class="split-right"><div class="split-title">🦶 左腳</div>';
                SERVOS.filter(s=>s.part==='lleg').forEach(s=> html += renderServoRow(s));
                html += '</div></div>';
            }
            document.getElementById('servoContainer').innerHTML = html;
            attachInputEvents();
            if(selectedServo) highlightSelected();
        }

        function renderServoRow(s) {
            const angle = currentAngles[`${s.group}_${s.id}`] || s.home;
            const decKey = s.shortKey.dec === '\'' ? '\'' : s.shortKey.dec;
            const incKey = s.shortKey.inc === '\\' ? '\\' : s.shortKey.inc;
            return `
                <div class="servo-row ${s.group}" id="row_${s.group}_${s.id}" data-group="${s.group}" data-id="${s.id}">
                    <div class="servo-info">
                        <div class="servo-name">${s.nameZh}</div>
                        <div class="servo-detail">
                            <span class="binary-id">ID:${s.id}</span>
                            <span>${s.group}</span>
                            ${s.home!==7500?'<span class="home-star">★</span>':''}
                            <span class="shortkey-badge" onclick="window.selectByKey('${s.shortKey.dec}')">${decKey}</span>
                            <span class="shortkey-badge" onclick="window.selectByKey('${s.shortKey.inc}')">${incKey}</span>
                        </div>
                    </div>
                    <div class="controls-wrapper">
                        <div class="angle-control">
                            <span class="angle-label">角</span>
                            <button class="btn-angle" onclick="window.sendDelta('${s.group}',${s.id},-50)">−</button>
                            <input type="text" class="angle-input" id="input_${s.group}_${s.id}" value="${angle}" data-group="${s.group}" data-id="${s.id}">
                            <button class="btn-angle" onclick="window.sendDelta('${s.group}',${s.id},50)">+</button>
                        </div>
                        <div class="speed-control">
                            <span class="speed-label">速</span>
                            <button class="btn-speed" onclick="window.adjustSp('${s.group}',${s.id},-5)">−</button>
                            <input type="text" class="speed-input" id="speed_${s.group}_${s.id}" value="${s.speed}" data-group="${s.group}" data-id="${s.id}">
                            <button class="btn-speed" onclick="window.adjustSp('${s.group}',${s.id},5)">+</button>
                        </div>
                    </div>
                </div>`;
        }

        function attachInputEvents() {
            document.querySelectorAll('.angle-input').forEach(inp => {
                inp.addEventListener('click', e => e.target.select());
                inp.addEventListener('focus', e => e.target.select());
                inp.addEventListener('keypress', e => {
                    if(e.key === 'Enter') {
                        e.preventDefault();
                        inp.blur();
                    }
                });
                inp.addEventListener('blur', e => {
                    const g = inp.dataset.group, id = parseInt(inp.dataset.id);
                    let val = parseInt(inp.value);
                    if(isNaN(val)) { 
                        const s=SERVOS.find(s=>s.group===g&&s.id===id); 
                        if(s) inp.value = s.home; 
                        return; 
                    }
                    sendExactAngle(g,id,val);
                });
            });
            
            document.querySelectorAll('.speed-input').forEach(inp => {
                inp.addEventListener('click', e => e.target.select());
                inp.addEventListener('focus', e => e.target.select());
                inp.addEventListener('keypress', e => {
                    if(e.key === 'Enter') {
                        e.preventDefault();
                        inp.blur();
                    }
                });
                inp.addEventListener('blur', e => {
                    const g = inp.dataset.group, id = parseInt(inp.dataset.id);
                    let sp = parseInt(inp.value);
                    if(isNaN(sp)) sp=30; if(sp<0) sp=0; if(sp>127) sp=127;
                    inp.value = sp;
                    const s = SERVOS.find(s=>s.group===g&&s.id===id);
                    if(s) s.speed = sp;
                    if(selectedServo && selectedServo.group===g && selectedServo.id===id)
                        document.getElementById('selectedHint').innerText = `⚡ 選中: ${s.nameZh} 速度${sp}`;
                });
            });
        }

        function highlightSelected() {
            document.querySelectorAll('.servo-row').forEach(r=>r.classList.remove('selected'));
            if(selectedServo) {
                const row = document.getElementById(`row_${selectedServo.group}_${selectedServo.id}`);
                if(row) row.classList.add('selected');
                document.getElementById('selectedHint').innerText = `⚡ 選中: ${selectedServo.nameZh} 速度${selectedServo.speed}`;
            }
        }

        window.selectByKey = function(key) {
            const list = SERVOS.filter(s => 
                s.part === currentPart || 
                (currentPart==='hand' && (s.part==='rhand'||s.part==='lhand')) ||
                (currentPart==='leg' && (s.part==='rleg'||s.part==='lleg'))
            );
            const s = list.find(s=>s.shortKey.dec===key || s.shortKey.inc===key);
            if(s) { selectedServo = s; highlightSelected(); addLog(`✅ 選中 ${s.nameZh}`,'info'); }
        };

        // ========== 操作 ==========
        window.sendDelta = async function(group, id, delta) {
            if(!port) { alert('請先連接'); return; }
            const s = SERVOS.find(s=>s.group===group && s.id===id);
            if(!s) return;
            const inp = document.getElementById(`input_${group}_${id}`);
            let cur = parseInt(inp.value);
            let nv = cur + delta;
            if(nv < s.min) nv = s.min; if(nv > s.max) nv = s.max;
            inp.value = nv;
            currentAngles[`${group}_${id}`] = nv;
            await sendCommand(group, id, nv, s.speed);
            const row = document.getElementById(`row_${group}_${id}`);
            if(row) {
                row.classList.add(delta<0?'active-dec':'active-inc');
                setTimeout(()=>row.classList.remove('active-dec','active-inc'),300);
            }
        };

        async function sendExactAngle(group,id,val) {
            const s = SERVOS.find(s=>s.group===group && s.id===id);
            if(!s) return;
            if(val < s.min) val = s.min; if(val > s.max) val = s.max;
            document.getElementById(`input_${group}_${id}`).value = val;
            currentAngles[`${group}_${id}`] = val;
            await sendCommand(group, id, val, s.speed);
        }

        window.adjustSp = function(group,id,delta) {
            const s = SERVOS.find(s=>s.group===group && s.id===id);
            if(!s) return;
            let ns = s.speed + delta;
            if(ns<0) ns=0; if(ns>127) ns=127;
            s.speed = ns;
            const inp = document.getElementById(`speed_${group}_${id}`);
            if(inp) inp.value = ns;
            if(selectedServo && selectedServo.group===group && selectedServo.id===id)
                document.getElementById('selectedHint').innerText = `⚡ 選中: ${s.nameZh} 速度${ns}`;
        };

        // ========== HOME 功能 ==========
        async function homeMulti(servoList, name) {
            if(!port) { alert('請先連接'); return; }
            if(servoList.length===0) return;
            
            const targets = servoList.map(s => ({ 
                group: s.group, 
                id: s.id,
                angle: s.home 
            }));
            
            for(let t of targets) {
                const inp = document.getElementById(`input_${t.group}_${t.id}`);
                if(inp) inp.value = t.angle;
                currentAngles[`${t.group}_${t.id}`] = t.angle;
            }
            
            if(currentMode === 'ASCII') {
                let cmd = `S MULTI 30 ${targets.length}`;
                for(let t of targets) cmd += ` ${t.group}${t.id} ${t.angle}`;
                await sendRaw(cmd);
            } else {
                const packet = [4 + targets.length * 3, 0x18, 30];
                for(let t of targets) {
                    packet.push(t.id);
                    packet.push((t.angle >> 7) & 0x7F);
                    packet.push(t.angle & 0x7F);
                }
                let xor = 0; 
                for(let b of packet) xor ^= b; 
                packet.push(xor);
                
                const writer = port.writable.getWriter();
                await writer.write(new Uint8Array(packet));
                writer.releaseLock();
                
                const hex = packet.map(b=>b.toString(16).padStart(2,'0').toUpperCase()).join(' ');
                addLog('📤 [ICS] ' + hex, 'sent');
            }
            addLog(`🏠 ${name} HOME 完成`,'received');
        }

        function homeHeadFunc() { homeMulti(SERVOS.filter(s=>s.part==='head'), '頭部'); }
        function homeHandFunc() { homeMulti(SERVOS.filter(s=>s.part==='rhand'||s.part==='lhand'), '手部'); }
        function homeLegFunc() { homeMulti(SERVOS.filter(s=>s.part==='rleg'||s.part==='lleg'), '腳部'); }
        function homeAllFunc() { homeMulti(SERVOS, '全部'); }

        // ========== 脫力 ==========
        async function freePart(servoList, partName) {
            if(!port) { alert('請先連接'); return; }
            for(let s of servoList) {
                await sendRaw(`FREE ${s.group} ${s.id}`);
                await delay(15);
            }
            addLog(`💤 ${partName} 脫力完成`,'received');
        }
        async function freeHead() { await freePart(SERVOS.filter(s=>s.part==='head'), '頭部'); }
        async function freeHand() { await freePart(SERVOS.filter(s=>s.part==='rhand'||s.part==='lhand'), '雙手'); }
        async function freeLeg()  { await freePart(SERVOS.filter(s=>s.part==='rleg'||s.part==='lleg'), '雙腳'); }

        // ========== 長按 ==========
        function startRepeat(s, delta) {
            if(repeatTimer) clearInterval(repeatTimer);
            activeServo = s; activeDelta = delta; isKeyHeld = true;
            window.sendDelta(s.group, s.id, delta);
            repeatTimer = setInterval(()=>{
                if(isKeyHeld && activeServo) window.sendDelta(activeServo.group, activeServo.id, activeDelta);
            },200);
        }
        function stopRepeat() { isKeyHeld=false; activeServo=null; if(repeatTimer) { clearInterval(repeatTimer); repeatTimer=null; } }

        // ========== 鍵盤 ==========
        document.addEventListener('keydown', (e) => {
            const k = e.key;
            if(document.activeElement?.tagName==='INPUT') return;

            if(k === '8') { e.preventDefault(); freeHead(); return; }
            if(k === '9') { e.preventDefault(); freeHand(); return; }
            if(k === '0') { e.preventDefault(); freeLeg(); return; }
            if(k === '1') { renderPanel('head'); e.preventDefault(); return; }
            if(k === '2') { renderPanel('hand'); e.preventDefault(); return; }
            if(k === '3') { renderPanel('leg'); e.preventDefault(); return; }
            if(k === '4') { homeAllFunc(); e.preventDefault(); return; }
            if(k === '5') { homeHeadFunc(); e.preventDefault(); return; }
            if(k === '6') { homeHandFunc(); e.preventDefault(); return; }
            if(k === '7') { homeLegFunc(); e.preventDefault(); return; }

            if(k === 'ArrowUp' || k === 'ArrowDown') {
                e.preventDefault();
                if(selectedServo) window.adjustSp(selectedServo.group, selectedServo.id, k==='ArrowUp'?5:-5);
                return;
            }

            const list = SERVOS.filter(s => 
                s.part === currentPart || 
                (currentPart==='hand' && (s.part==='rhand'||s.part==='lhand')) ||
                (currentPart==='leg' && (s.part==='rleg'||s.part==='lleg'))
            );
            const s = list.find(s=>s.shortKey.dec===k || s.shortKey.inc===k);
            if(s) {
                e.preventDefault();
                const otherKey = (k===s.shortKey.dec) ? s.shortKey.inc : s.shortKey.dec;
                if(pressedKeys.has(otherKey)) {
                    stopRepeat();
                    sendExactAngle(s.group, s.id, s.home);
                } else {
                    selectedServo = s;
                    highlightSelected();
                    const delta = (k===s.shortKey.dec) ? -50 : 50;
                    startRepeat(s, delta);
                }
                pressedKeys.add(k);
            }
        });

        document.addEventListener('keyup', (e) => {
            pressedKeys.delete(e.key);
            if(pressedKeys.size===0) stopRepeat();
        });
        window.addEventListener('blur', ()=>{ pressedKeys.clear(); stopRepeat(); });

        // ========== 串口 ==========
        async function sendRaw(cmd) {
            if(!port) { addLog('❌ 未連接','error'); return false; }
            try {
                const w = port.writable.getWriter();
                await w.write(new TextEncoder().encode(cmd + '\n'));
                w.releaseLock();
                addLog('📤 ' + cmd, 'sent');
                return true;
            } catch(e) { addLog(`❌ 發送失敗 ${e.message}`,'error'); return false; }
        }

        async function connectSerial() {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate:115200 });
                document.getElementById('status').innerHTML='✅ 已連接';
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('disconnectBtn').disabled = false;
                addLog('✅ 串口已連接','received');
                readLoop();
            } catch(e) { addLog(`❌ 連接失敗: ${e.message}`,'error'); }
        }
        async function disconnectSerial() {
            if(reader) { try{await reader.cancel();}catch(e){} reader=null; }
            if(port) { try{await port.close();}catch(e){} port=null; }
            document.getElementById('status').innerHTML='⚡ 未連接';
            document.getElementById('connectBtn').disabled = false;
            document.getElementById('disconnectBtn').disabled = true;
            addLog('🔌 已斷開','received');
        }
        async function readLoop() {
            if(!port) return;
            try {
                reader = port.readable.getReader();
                const dec = new TextDecoder();
                let buf='';
                while(true) {
                    const {value,done}=await reader.read();
                    if(done) break;
                    if(value) {
                        buf+=dec.decode(value);
                        let lines=buf.split('\n');
                        buf=lines.pop();
                        for(let l of lines) {
                            l=l.trim(); if(!l) continue;
                            addLog('📥 '+l,'received');
                            if(l.includes('加速度')||l.includes('陀螺')) addGyro(l);
                            
                            // 解析回應, 更新角度顯示 (支援 MV 同 HV)
                            const mvMatch = l.match(/MV ID (\d+).*?(\d+)/);
                            if(mvMatch) {
                                let id = parseInt(mvMatch[1]);
                                let ang = parseInt(mvMatch[2]);
                                const binaryId = id + 20; // MV1->21, MV2->22...
                                const inp = document.getElementById(`input_MV_${binaryId}`);
                                if(inp && Math.abs(parseInt(inp.value)-ang)>10) { 
                                    inp.value = ang; 
                                    currentAngles[`MV_${binaryId}`] = ang; 
                                }
                            }
                            
                            const hvMatch = l.match(/HV ID (\d+).*?(\d+)/);
                            if(hvMatch) {
                                let id = parseInt(hvMatch[1]);
                                let ang = parseInt(hvMatch[2]);
                                const inp = document.getElementById(`input_HV_${id}`);
                                if(inp && Math.abs(parseInt(inp.value)-ang)>10) { 
                                    inp.value = ang; 
                                    currentAngles[`HV_${id}`] = ang; 
                                }
                            }
                        }
                    }
                }
            } catch(e) { addLog(`❌ 讀取錯誤 ${e.message}`,'error'); }
            finally { if(reader) { reader.releaseLock(); reader=null; } }
        }
        async function scanServos() {
            if(!port) { alert('請先連接'); return; }
            addLog('🔍 掃描所有伺服','sent');
            for(let i=1;i<=11;i++) { await sendRaw(`? MV ${i}`); await delay(30); }
            for(let i=1;i<=14;i++) { await sendRaw(`? HV ${i}`); await delay(30); }
        }
        async function queryGyro() {
            if(!port) { alert('請先連接'); return; }
            await sendRaw('G');
        }

        // ========== 複製功能 ==========
        document.getElementById('copyLogBtn').addEventListener('click', ()=>{
            const log = document.getElementById('logContent').innerText;
            navigator.clipboard.writeText(log);
            addLog('📋 日誌已複製','info');
        });
        
        document.getElementById('copyGyroBtn').addEventListener('click', ()=>{
            const gyro = document.getElementById('gyroContent').innerText;
            navigator.clipboard.writeText(gyro);
            addGyro('📋 陀螺儀數據已複製');
        });

        // ========== 初始化 ==========
        window.onload = function() {
            renderPanel('head');
            document.getElementById('navHead').onclick = ()=>renderPanel('head');
            document.getElementById('navHand').onclick = ()=>renderPanel('hand');
            document.getElementById('navLeg').onclick = ()=>renderPanel('leg');

            document.getElementById('connectBtn').onclick = connectSerial;
            document.getElementById('disconnectBtn').onclick = disconnectSerial;
            document.getElementById('scanBtn').onclick = scanServos;
            document.getElementById('gyroBtn').onclick = queryGyro;

            document.getElementById('homeAllBtn').onclick = homeAllFunc;
            document.getElementById('homeHeadBtn').onclick = homeHeadFunc;
            document.getElementById('homeHandBtn').onclick = homeHandFunc;
            document.getElementById('homeLegBtn').onclick = homeLegFunc;

            document.getElementById('freeHeadBtn').onclick = freeHead;
            document.getElementById('freeHandBtn').onclick = freeHand;
            document.getElementById('freeLegBtn').onclick = freeLeg;

            document.getElementById('clearLogBtn').onclick = ()=>document.getElementById('logContent').innerHTML = '[系統] 記錄已清除';
            document.getElementById('clearGyroBtn').onclick = ()=>document.getElementById('gyroContent').innerHTML = '等待陀螺儀數據…';
        };
    })();
</script>
</body>
</html>
