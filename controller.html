<body>

</div>

<script>
    (function() {
        // ========== 伺服定義 (HV:1-14, MV:21-31) ==========
        const SERVOS = [
            { id:21, nameZh:'頭部俯仰', min:7200, max:8400, home:7500, group:'MV', part:'head', shortKey:{ dec:'q', inc:'w' }, speed:30, stretch:64 },
            { id:22, nameZh:'頭部左右', min:5000, max:10000, home:7500, group:'MV', part:'head', shortKey:{ dec:'e', inc:'r' }, speed:30, stretch:64 },
            { id:23, nameZh:'頭部側傾', min:6900, max:8100, home:7500, group:'MV', part:'head', shortKey:{ dec:'t', inc:'y' }, speed:30, stretch:64 },
            { id:1, nameZh:'右肩 pitch', min:4300, max:11500, home:10200, group:'HV', part:'rhand', shortKey:{ dec:'q', inc:'w' }, speed:30, stretch:64 },
            { id:24, nameZh:'右肩 roll',  min:7450, max:10350, home:9800, group:'MV', part:'rhand', shortKey:{ dec:'e', inc:'r' }, speed:30, stretch:64 },
            { id:26, nameZh:'右上臂 yaw', min:4000, max:11000, home:7500, group:'MV', part:'rhand', shortKey:{ dec:'t', inc:'y' }, speed:30, stretch:64 },
            { id:28, nameZh:'右肘 pitch', min:7100, max:11000, home:7500, group:'MV', part:'rhand', shortKey:{ dec:'u', inc:'i' }, speed:30, stretch:64 },
            { id:30, nameZh:'右手腕 yaw', min:3500, max:11500, home:5000, group:'MV', part:'rhand', shortKey:{ dec:'o', inc:'p' }, speed:30, stretch:64 },
            { id:2, nameZh:'左肩 pitch', min:3500, max:10700, home:4700, group:'HV', part:'lhand', shortKey:{ dec:'a', inc:'s' }, speed:30, stretch:64 },
            { id:25, nameZh:'左肩 roll',  min:4550, max:7550, home:5200, group:'MV', part:'lhand', shortKey:{ dec:'d', inc:'f' }, speed:30, stretch:64 },
            { id:27, nameZh:'左上臂 yaw', min:4000, max:11000, home:7500, group:'MV', part:'lhand', shortKey:{ dec:'g', inc:'h' }, speed:30, stretch:64 },
            { id:29, nameZh:'左肘 pitch', min:4000, max:7900, home:7500, group:'MV', part:'lhand', shortKey:{ dec:'j', inc:'k' }, speed:30, stretch:64 },
            { id:31, nameZh:'左手腕 yaw', min:3500, max:11500, home:10000, group:'MV', part:'lhand', shortKey:{ dec:'l', inc:';' }, speed:30, stretch:64 },
            { id:3, nameZh:'右髖 yaw',   min:6530, max:9030, home:7780, group:'HV', part:'rleg', shortKey:{ dec:'q', inc:'w' }, speed:30, stretch:64 },
            { id:5, nameZh:'右髖 roll',  min:6700, max:8300, home:7400, group:'HV', part:'rleg', shortKey:{ dec:'e', inc:'r' }, speed:30, stretch:64 },
            { id:7, nameZh:'右大腿 pitch', min:4700, max:10200, home:7500, group:'HV', part:'rleg', shortKey:{ dec:'t', inc:'y' }, speed:30, stretch:64 },
            { id:9, nameZh:'右膝 pitch', min:3950, max:7600, home:7500, group:'HV', part:'rleg', shortKey:{ dec:'u', inc:'i' }, speed:30, stretch:64 },
            { id:11, nameZh:'右踝 pitch', min:5700, max:8300, home:7500, group:'HV', part:'rleg', shortKey:{ dec:'o', inc:'p' }, speed:30, stretch:64 },
            { id:13, nameZh:'右踝 roll',  min:6800, max:9150, home:7825, group:'HV', part:'rleg', shortKey:{ dec:'[', inc:']' }, speed:30, stretch:64 },
            { id:4, nameZh:'左髖 yaw',   min:6250, max:8750, home:7500, group:'HV', part:'lleg', shortKey:{ dec:'a', inc:'s' }, speed:30, stretch:64 },
            { id:6, nameZh:'左髖 roll',  min:6700, max:8300, home:7600, group:'HV', part:'lleg', shortKey:{ dec:'d', inc:'f' }, speed:30, stretch:64 },
            { id:8, nameZh:'左大腿 pitch', min:4700, max:10200, home:7500, group:'HV', part:'lleg', shortKey:{ dec:'g', inc:'h' }, speed:30, stretch:64 },
            { id:10, nameZh:'左膝 pitch', min:7400, max:11050, home:7500, group:'HV', part:'lleg', shortKey:{ dec:'j', inc:'k' }, speed:30, stretch:64 },
            { id:12, nameZh:'左踝 pitch', min:6750, max:9350, home:7550, group:'HV', part:'lleg', shortKey:{ dec:'l', inc:';' }, speed:30, stretch:64 },
            { id:14, nameZh:'左踝 roll',  min:6200, max:8450, home:7450, group:'HV', part:'lleg', shortKey:{ dec:'\'', inc:'\\' }, speed:30, stretch:64 }
        ];

        // ========== 全域變數 ==========
        let currentPart = 'head';
        let port = null, reader = null;
        let currentAngles = {};
        let currentStretch = {};
        let selectedServo = null;
        let pressedKeys = new Set();
        let repeatTimer = null, activeServo = null, activeDelta = 0, isKeyHeld = false;
        let activeAdjustType = null;

        SERVOS.forEach(s => { 
            currentAngles[`${s.group}_${s.id}`] = s.home;
            currentStretch[`${s.group}_${s.id}`] = s.stretch;
        });

        // ========== 輔助函式 ==========
        function addLog(msg, type='info', binaryHex = null) {
            const log = document.getElementById('logContent');
            const time = new Date().toLocaleTimeString();
            let cls = '';
            if(type === 'sent') cls = 'log-sent';
            else if(type === 'received') cls = 'log-received';
            else if(type === 'binary') cls = 'log-binary';
            
            if(binaryHex) {
                log.innerHTML += `<div><span class="${cls}">[${time}] ${msg} [${binaryHex}]</span></div>`;
            } else {
                log.innerHTML += `<div><span class="${cls}">[${time}] ${msg}</span></div>`;
            }
            log.scrollTop = log.scrollHeight;
            if(log.children.length > 200) log.removeChild(log.firstChild);
        }
        
        function addGyro(msg) {
            const g = document.getElementById('gyroContent');
            const time = new Date().toLocaleTimeString();
            g.innerHTML += `<div>[${time}] ${msg}</div>`;
            g.scrollTop = g.scrollHeight;
            if(g.children.length > 50) g.removeChild(g.firstChild);
        }
        
        function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

        // ========== 發送 Binary 指令 (帶 Hex 顯示) ==========
        async function sendBinary(packet) {
            if(!port) { addLog('❌ 未連接','error'); return false; }
            try {
                const writer = port.writable.getWriter();
                await writer.write(new Uint8Array(packet));
                writer.releaseLock();
                const hex = packet.map(b => b.toString(16).padStart(2, '0').toUpperCase()).join(' ');
                addLog(`📤 [ICS]`, 'binary', hex);
                return true;
            } catch(e) {
                addLog(`❌ 發送失敗: ${e.message}`, 'error');
                return false;
            }
        }
        
        async function sendASCII(cmd) {
            if(!port) return false;
            try {
                const writer = port.writable.getWriter();
                await writer.write(new TextEncoder().encode(cmd + '\n'));
                writer.releaseLock();
                addLog(`📤 ${cmd}`, 'sent');
                return true;
            } catch(e) {
                addLog(`❌ 發送失敗: ${e.message}`, 'error');
                return false;
            }
        }

        // ========== 官方 ICS Binary 功能 ==========
        async function sendSpeed(id, speed) {
            const packet = [0xC0 | id, 0x02, speed];
            return sendBinary(packet);
        }
        
        async function sendPosition(id, angle) {
            const high = (angle >> 7) & 0x7F;
            const low = angle & 0x7F;
            const packet = [0x80 | id, high, low];
            return sendBinary(packet);
        }
        
        async function sendStretch(id, stretch) {
            if(stretch < 1) stretch = 1;
            if(stretch > 127) stretch = 127;
            const packet = [0xC0 | id, 0x01, stretch];
            return sendBinary(packet);
        }
        
        // 官方脫力指令: [0x80+ID, 0x00, 0x00]
        async function sendFree(id) {
            const packet = [0x80 | id, 0x00, 0x00];
            return sendBinary(packet);
        }
        
        async function sendCommand(group, id, angle, speed) {
            await sendSpeed(id, speed);
            await delay(5);
            await sendPosition(id, angle);
            return true;
        }

        // ========== 讀取角度 (使用 ASCII) ==========
        async function readAngle(group, id) {
            return new Promise((resolve) => {
                const timeout = setTimeout(() => {
                    resolve(null);
                }, 500);
                
                let responseHandler = null;
                
                const tempReader = async () => {
                    if(!port || !port.readable) return;
                    try {
                        const tmpReader = port.readable.getReader();
                        const decoder = new TextDecoder();
                        let buffer = '';
                        
                        while(true) {
                            const {value, done} = await tmpReader.read();
                            if(done) break;
                            buffer += decoder.decode(value);
                            let lines = buffer.split('\n');
                            buffer = lines.pop();
                            
                            for(let line of lines) {
                                const match = line.match(new RegExp(`${group} ID ${id}.*?(\\d+)`));
                                if(match) {
                                    clearTimeout(timeout);
                                    tmpReader.releaseLock();
                                    resolve(parseInt(match[1]));
                                    return;
                                }
                            }
                        }
                        tmpReader.releaseLock();
                        resolve(null);
                    } catch(e) {
                        resolve(null);
                    }
                };
                
                sendASCII(`? ${group} ${id}`).then(() => {
                    tempReader();
                });
            });
        }
        
        // ========== 讀取全部角度 ==========
        async function readAllAngles() {
            if(!port) { alert('請先連接'); return; }
            addLog('📖 開始讀取所有伺服角度 (使用ASCII)...', 'info');
            
            for(let s of SERVOS) {
                await delay(80);
                const angle = await readAngle(s.group, s.id);
                if(angle !== null) {
                    currentAngles[`${s.group}_${s.id}`] = angle;
                    const inp = document.getElementById(`input_${s.group}_${s.id}`);
                    if(inp) inp.value = angle;
                    addLog(`📥 ${s.group}${s.id} ${s.nameZh} = ${angle}`, 'received');
                } else {
                    addLog(`⚠️ ${s.group}${s.id} 讀取超時`, 'info');
                }
            }
            addLog('✅ 讀取完成', 'received');
        }

        // ========== 渲染 ==========
        function renderPanel(part) {
            currentPart = part;
            document.querySelectorAll('.part-button').forEach(b => b.classList.remove('active'));
            document.getElementById(`nav${part.charAt(0).toUpperCase() + part.slice(1)}`).classList.add('active');

            let title = part === 'head' ? '👤 頭部控制' : part === 'hand' ? '🖐️ 手部控制' : '🦶 腳部控制';
            document.getElementById('panelTitle').innerText = title;

            let html = '';
            if (part === 'head') {
                html = '<div class="split-left" style="grid-column:span2;">';
                SERVOS.filter(s => s.part === 'head').forEach(s => html += renderServoRow(s));
                html += '</div>';
            } else if (part === 'hand') {
                html = '<div class="split-panel"><div class="split-left"><div class="split-title">👉 右手</div>';
                SERVOS.filter(s => s.part === 'rhand').forEach(s => html += renderServoRow(s));
                html += '</div><div class="split-right"><div class="split-title">👈 左手</div>';
                SERVOS.filter(s => s.part === 'lhand').forEach(s => html += renderServoRow(s));
                html += '</div></div>';
            } else {
                html = '<div class="split-panel"><div class="split-left"><div class="split-title">🦶 右腳</div>';
                SERVOS.filter(s => s.part === 'rleg').forEach(s => html += renderServoRow(s));
                html += '</div><div class="split-right"><div class="split-title">🦶 左腳</div>';
                SERVOS.filter(s => s.part === 'lleg').forEach(s => html += renderServoRow(s));
                html += '</div></div>';
            }
            document.getElementById('servoContainer').innerHTML = html;
            attachInputEvents();
            if (selectedServo) highlightSelected();
        }

        function renderServoRow(s) {
            const angle = currentAngles[`${s.group}_${s.id}`] || s.home;
            const stretch = currentStretch[`${s.group}_${s.id}`] || s.stretch;
            const decKey = s.shortKey.dec === '\'' ? '\'' : s.shortKey.dec;
            const incKey = s.shortKey.inc === '\\' ? '\\' : s.shortKey.inc;
            return `
                <div class="servo-row ${s.group}" id="row_${s.group}_${s.id}" data-group="${s.group}" data-id="${s.id}">
                    <div class="servo-info">
                        <div class="servo-name">${s.nameZh}</div>
                        <div class="servo-detail">
                            <span class="binary-id">ID:${s.id}</span>
                            <span>${s.group}</span>
                            ${s.home !== 7500 ? '<span class="home-star">★</span>' : ''}
                            <span class="shortkey-badge" onclick="window.selectByKey('${s.shortKey.dec}')">${decKey}</span>
                            <span class="shortkey-badge" onclick="window.selectByKey('${s.shortKey.inc}')">${incKey}</span>
                        </div>
                    </div>
                    <div class="controls-wrapper">
                        <div class="angle-control">
                            <span class="angle-label">角</span>
                            <button class="btn-angle" onclick="window.sendDelta('${s.group}',${s.id},-50)">−</button>
                            <input type="text" class="angle-input" id="input_${s.group}_${s.id}" value="${angle}" data-group="${s.group}" data-id="${s.id}">
                            <button class="btn-angle" onclick="window.sendDelta('${s.group}',${s.id},50)">+</button>
                        </div>
                        <div class="speed-control">
                            <span class="speed-label">速</span>
                            <button class="btn-speed" onclick="window.adjustSpeed('${s.group}',${s.id},-5)">−</button>
                            <input type="text" class="speed-input" id="speed_${s.group}_${s.id}" value="${s.speed}" data-group="${s.group}" data-id="${s.id}">
                            <button class="btn-speed" onclick="window.adjustSpeed('${s.group}',${s.id},5)">+</button>
                        </div>
                        <div class="stretch-control">
                            <span class="stretch-label">扭</span>
                            <button class="btn-stretch-small" onclick="window.adjustStretch('${s.group}',${s.id},-10)">−</button>
                            <input type="text" class="stretch-input" id="stretch_${s.group}_${s.id}" value="${stretch}" data-group="${s.group}" data-id="${s.id}">
                            <button class="btn-stretch-small" onclick="window.adjustStretch('${s.group}',${s.id},10)">+</button>
                        </div>
                    </div>
                </div>`;
        }

        function attachInputEvents() {
            document.querySelectorAll('.angle-input').forEach(inp => {
                inp.addEventListener('blur', e => {
                    const g = inp.dataset.group, id = parseInt(inp.dataset.id);
                    let val = parseInt(inp.value);
                    const s = SERVOS.find(s => s.group === g && s.id === id);
                    if (isNaN(val)) { inp.value = s.home; val = s.home; }
                    if (val < s.min) val = s.min;
                    if (val > s.max) val = s.max;
                    inp.value = val;
                    currentAngles[`${g}_${id}`] = val;
                    sendCommand(g, id, val, s.speed);
                });
            });
            
            document.querySelectorAll('.speed-input').forEach(inp => {
                inp.addEventListener('blur', e => {
                    const g = inp.dataset.group, id = parseInt(inp.dataset.id);
                    let sp = parseInt(inp.value);
                    if (isNaN(sp)) sp = 30;
                    if (sp < 0) sp = 0;
                    if (sp > 127) sp = 127;
                    inp.value = sp;
                    const s = SERVOS.find(s => s.group === g && s.id === id);
                    if (s) s.speed = sp;
                    sendSpeed(id, sp);
                });
            });
            
            document.querySelectorAll('.stretch-input').forEach(inp => {
                inp.addEventListener('blur', e => {
                    const g = inp.dataset.group, id = parseInt(inp.dataset.id);
                    let st = parseInt(inp.value);
                    if (isNaN(st)) st = 64;
                    if (st < 1) st = 1;
                    if (st > 127) st = 127;
                    inp.value = st;
                    currentStretch[`${g}_${id}`] = st;
                    sendStretch(id, st);
                });
            });
        }

        function highlightSelected() {
            document.querySelectorAll('.servo-row').forEach(r => r.classList.remove('selected'));
            if (selectedServo) {
                const row = document.getElementById(`row_${selectedServo.group}_${selectedServo.id}`);
                if (row) row.classList.add('selected');
                const stretch = currentStretch[`${selectedServo.group}_${selectedServo.id}`] || 64;
                document.getElementById('selectedHint').innerHTML = `⚡ 選中: ${selectedServo.nameZh} 速度${selectedServo.speed} 扭力${stretch}`;
            }
        }

        window.selectByKey = function(key) {
            const list = SERVOS.filter(s => 
                s.part === currentPart || 
                (currentPart === 'hand' && (s.part === 'rhand' || s.part === 'lhand')) ||
                (currentPart === 'leg' && (s.part === 'rleg' || s.part === 'lleg'))
            );
            const s = list.find(s => s.shortKey.dec === key || s.shortKey.inc === key);
            if (s) { selectedServo = s; highlightSelected(); addLog(`✅ 選中 ${s.nameZh}`, 'info'); }
        };

        // ========== 操作 ==========
        window.sendDelta = async function(group, id, delta) {
            if (!port) { alert('請先連接'); return; }
            const s = SERVOS.find(s => s.group === group && s.id === id);
            if (!s) return;
            const inp = document.getElementById(`input_${group}_${id}`);
            let cur = parseInt(inp.value);
            let nv = cur + delta;
            if (nv < s.min) nv = s.min;
            if (nv > s.max) nv = s.max;
            inp.value = nv;
            currentAngles[`${group}_${id}`] = nv;
            await sendCommand(group, id, nv, s.speed);
            const row = document.getElementById(`row_${group}_${id}`);
            if (row) {
                row.classList.add(delta < 0 ? 'active-dec' : 'active-inc');
                setTimeout(() => row.classList.remove('active-dec', 'active-inc'), 300);
            }
        };

        window.adjustSpeed = function(group, id, delta) {
            const s = SERVOS.find(s => s.group === group && s.id === id);
            if (!s) return;
            let ns = s.speed + delta;
            if (ns < 0) ns = 0;
            if (ns > 127) ns = 127;
            s.speed = ns;
            const inp = document.getElementById(`speed_${group}_${id}`);
            if (inp) inp.value = ns;
            sendSpeed(id, ns);
            if (selectedServo && selectedServo.group === group && selectedServo.id === id) {
                highlightSelected();
            }
        };
        
        window.adjustStretch = function(group, id, delta) {
            const s = SERVOS.find(s => s.group === group && s.id === id);
            if (!s) return;
            let ns = (currentStretch[`${group}_${id}`] || s.stretch) + delta;
            if (ns < 1) ns = 1;
            if (ns > 127) ns = 127;
            currentStretch[`${group}_${id}`] = ns;
            const inp = document.getElementById(`stretch_${group}_${id}`);
            if (inp) inp.value = ns;
            sendStretch(id, ns);
            if (selectedServo && selectedServo.group === group && selectedServo.id === id) {
                highlightSelected();
            }
        };

        // ========== HOME 功能 ==========
        async function homeMulti(servoList, name) {
            if (!port) { alert('請先連接'); return; }
            for (let s of servoList) {
                const inp = document.getElementById(`input_${s.group}_${s.id}`);
                if (inp) inp.value = s.home;
                currentAngles[`${s.group}_${s.id}`] = s.home;
            }
            for (let s of servoList) {
                await sendSpeed(s.id, 30);
                await delay(2);
            }
            await delay(10);
            for (let s of servoList) {
                await sendPosition(s.id, s.home);
                await delay(2);
            }
            addLog(`🏠 ${name} HOME 完成 (${servoList.length}軸)`, 'received');
        }

        function homeHeadFunc() { homeMulti(SERVOS.filter(s => s.part === 'head'), '頭部'); }
        function homeHandFunc() { homeMulti(SERVOS.filter(s => s.part === 'rhand' || s.part === 'lhand'), '手部'); }
        function homeLegFunc() { homeMulti(SERVOS.filter(s => s.part === 'rleg' || s.part === 'lleg'), '腳部'); }
        function homeAllFunc() { homeMulti(SERVOS, '全部'); }

        // ========== 脫力 ==========
        async function freePart(servoList, partName) {
            if (!port) { alert('請先連接'); return; }
            addLog(`💤 正在脫力 ${partName}...`, 'info');
            for (let s of servoList) {
                await sendFree(s.id);
                await delay(15);
            }
            addLog(`✅ ${partName} 脫力完成`, 'received');
        }
        
        async function freeAll() {
            if (!port) { alert('請先連接'); return; }
            addLog(`💤 正在脫力全部伺服...`, 'info');
            for (let s of SERVOS) {
                await sendFree(s.id);
                await delay(10);
            }
            addLog(`✅ 全部伺服脫力完成`, 'received');
        }
        
        async function freeHead() { await freePart(SERVOS.filter(s => s.part === 'head'), '頭部'); }
        async function freeHand() { await freePart(SERVOS.filter(s => s.part === 'rhand' || s.part === 'lhand'), '雙手'); }
        async function freeLeg() { await freePart(SERVOS.filter(s => s.part === 'rleg' || s.part === 'lleg'), '雙腳'); }

        // ========== 掃描 ==========
        async function scanServos() {
            if (!port) { alert('請先連接'); return; }
            addLog('🔍 掃描所有伺服', 'sent');
            for (let i = 1; i <= 11; i++) {
                await sendASCII(`? MV ${i}`);
                await delay(40);
            }
            for (let i = 1; i <= 14; i++) {
                await sendASCII(`? HV ${i}`);
                await delay(40);
            }
        }
        
        async function queryGyro() {
            if (!port) { alert('請先連接'); return; }
            await sendASCII('G');
        }

        // ========== 自訂指令 ==========
        async function sendCustomCommand() {
            if (!port) { alert('請先連接'); return; }
            const input = document.getElementById('customCmd').value.trim();
            if (!input) return;
            
            // 檢查是否為 HEX 格式 (空格分隔，每個是 2位 hex)
            const hexPattern = /^[0-9A-Fa-f]{2}( [0-9A-Fa-f]{2})*$/;
            if (hexPattern.test(input)) {
                const bytes = input.split(' ').map(b => parseInt(b, 16));
                await sendBinary(bytes);
            } else {
                // 當作 ASCII 指令
                await sendASCII(input);
            }
        }
        
        async function sendHexCommand() {
            if (!port) { alert('請先連接'); return; }
            const input = document.getElementById('customCmd').value.trim();
            if (!input) return;
            
            const bytes = input.split(' ').map(b => parseInt(b, 16));
            if (bytes.some(isNaN)) {
                addLog('❌ HEX格式錯誤，請用空格分隔，如: 83 3A 4C', 'error');
                return;
            }
            await sendBinary(bytes);
        }

        // ========== 鍵盤 ==========
        function startRepeat(s, delta, type) {
            if (repeatTimer) clearInterval(repeatTimer);
            activeServo = s;
            activeDelta = delta;
            activeAdjustType = type;
            isKeyHeld = true;
            
            if (type === 'angle') window.sendDelta(s.group, s.id, delta);
            else if (type === 'speed') window.adjustSpeed(s.group, s.id, delta);
            else if (type === 'stretch') window.adjustStretch(s.group, s.id, delta);
            
            repeatTimer = setInterval(() => {
                if (isKeyHeld && activeServo) {
                    if (activeAdjustType === 'angle') window.sendDelta(activeServo.group, activeServo.id, activeDelta);
                    else if (activeAdjustType === 'speed') window.adjustSpeed(activeServo.group, activeServo.id, activeDelta);
                    else if (activeAdjustType === 'stretch') window.adjustStretch(activeServo.group, activeServo.id, activeDelta);
                }
            }, 150);
        }
        
        function stopRepeat() {
            isKeyHeld = false;
            activeServo = null;
            activeAdjustType = null;
            if (repeatTimer) { clearInterval(repeatTimer); repeatTimer = null; }
        }

        document.addEventListener('keydown', (e) => {
            const k = e.key;
            if (document.activeElement?.tagName === 'INPUT') return;

            if (k === '8') { e.preventDefault(); freeHead(); return; }
            if (k === '9') { e.preventDefault(); freeHand(); return; }
            if (k === '0') { e.preventDefault(); freeLeg(); return; }
            if (k === '1') { renderPanel('head'); e.preventDefault(); return; }
            if (k === '2') { renderPanel('hand'); e.preventDefault(); return; }
            if (k === '3') { renderPanel('leg'); e.preventDefault(); return; }
            if (k === '4') { homeAllFunc(); e.preventDefault(); return; }
            if (k === '5') { homeHeadFunc(); e.preventDefault(); return; }
            if (k === '6') { homeHandFunc(); e.preventDefault(); return; }
            if (k === '7') { homeLegFunc(); e.preventDefault(); return; }

            if (selectedServo) {
                if (k === 'ArrowUp') { e.preventDefault(); window.adjustSpeed(selectedServo.group, selectedServo.id, 5); return; }
                if (k === 'ArrowDown') { e.preventDefault(); window.adjustSpeed(selectedServo.group, selectedServo.id, -5); return; }
                if (k === 'ArrowLeft') { e.preventDefault(); window.adjustStretch(selectedServo.group, selectedServo.id, -10); return; }
                if (k === 'ArrowRight') { e.preventDefault(); window.adjustStretch(selectedServo.group, selectedServo.id, 10); return; }
            }

            const list = SERVOS.filter(s => 
                s.part === currentPart || 
                (currentPart === 'hand' && (s.part === 'rhand' || s.part === 'lhand')) ||
                (currentPart === 'leg' && (s.part === 'rleg' || s.part === 'lleg'))
            );
            const s = list.find(s => s.shortKey.dec === k || s.shortKey.inc === k);
            if (s) {
                e.preventDefault();
                const otherKey = (k === s.shortKey.dec) ? s.shortKey.inc : s.shortKey.dec;
                if (pressedKeys.has(otherKey)) {
                    stopRepeat();
                    sendCommand(s.group, s.id, s.home, s.speed);
                } else {
                    selectedServo = s;
                    highlightSelected();
                    const delta = (k === s.shortKey.dec) ? -50 : 50;
                    startRepeat(s, delta, 'angle');
                }
                pressedKeys.add(k);
            }
        });

        document.addEventListener('keyup', (e) => {
            pressedKeys.delete(e.key);
            if (pressedKeys.size === 0) stopRepeat();
        });
        window.addEventListener('blur', () => { pressedKeys.clear(); stopRepeat(); });

        // ========== 串口 ==========
        async function connectSerial() {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                document.getElementById('status').innerHTML = '✅ 已連接';
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('disconnectBtn').disabled = false;
                addLog('✅ 串口已連接 - 官方ICS Binary協議', 'received');
                readLoop();
            } catch (e) { addLog(`❌ 連接失敗: ${e.message}`, 'error'); }
        }
        
        async function disconnectSerial() {
            if (reader) { try { await reader.cancel(); } catch (e) { } reader = null; }
            if (port) { try { await port.close(); } catch (e) { } port = null; }
            document.getElementById('status').innerHTML = '⚡ 未連接';
            document.getElementById('connectBtn').disabled = false;
            document.getElementById('disconnectBtn').disabled = true;
            addLog('🔌 已斷開', 'received');
        }
        
        async function readLoop() {
            if (!port) return;
            try {
                reader = port.readable.getReader();
                const dec = new TextDecoder();
                let buf = '';
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    if (value) {
                        buf += dec.decode(value);
                        let lines = buf.split('\n');
                        buf = lines.pop();
                        for (let l of lines) {
                            l = l.trim();
                            if (!l) continue;
                            addLog(l, 'received');
                            if (l.includes('加速度') || l.includes('陀螺')) addGyro(l);
                            
                            const mvMatch = l.match(/MV ID (\d+).*?(\d+)/);
                            if (mvMatch) {
                                let id = parseInt(mvMatch[1]);
                                let ang = parseInt(mvMatch[2]);
                                const binaryId = id + 20;
                                const inp = document.getElementById(`input_MV_${binaryId}`);
                                if (inp && Math.abs(parseInt(inp.value) - ang) > 5) {
                                    inp.value = ang;
                                    currentAngles[`MV_${binaryId}`] = ang;
                                }
                            }
                            
                            const hvMatch = l.match(/HV ID (\d+).*?(\d+)/);
                            if (hvMatch) {
                                let id = parseInt(hvMatch[1]);
                                let ang = parseInt(hvMatch[2]);
                                const inp = document.getElementById(`input_HV_${id}`);
                                if (inp && Math.abs(parseInt(inp.value) - ang) > 5) {
                                    inp.value = ang;
                                    currentAngles[`HV_${id}`] = ang;
                                }
                            }
                        }
                    }
                }
            } catch (e) { addLog(`❌ 讀取錯誤 ${e.message}`, 'error'); }
            finally { if (reader) { reader.releaseLock(); reader = null; } }
        }

        // ========== 初始化 ==========
        window.onload = function() {
            renderPanel('head');
            document.getElementById('navHead').onclick = () => renderPanel('head');
            document.getElementById('navHand').onclick = () => renderPanel('hand');
            document.getElementById('navLeg').onclick = () => renderPanel('leg');

            document.getElementById('connectBtn').onclick = connectSerial;
            document.getElementById('disconnectBtn').onclick = disconnectSerial;
            document.getElementById('scanBtn').onclick = scanServos;
            document.getElementById('gyroBtn').onclick = queryGyro;
            document.getElementById('readAllBtn').onclick = readAllAngles;
            document.getElementById('freeAllBtn').onclick = freeAll;
            document.getElementById('sendCustomBtn').onclick = sendCustomCommand;
            document.getElementById('sendHexBtn').onclick = sendHexCommand;

            document.getElementById('homeAllBtn').onclick = homeAllFunc;
            document.getElementById('homeHeadBtn').onclick = homeHeadFunc;
            document.getElementById('homeHandBtn').onclick = homeHandFunc;
            document.getElementById('homeLegBtn').onclick = homeLegFunc;

            document.getElementById('freeHeadBtn').onclick = freeHead;
            document.getElementById('freeHandBtn').onclick = freeHand;
            document.getElementById('freeLegBtn').onclick = freeLeg;

            document.getElementById('clearLogBtn').onclick = () => document.getElementById('logContent').innerHTML = '[系統] 記錄已清除';
            document.getElementById('clearGyroBtn').onclick = () => document.getElementById('gyroContent').innerHTML = '等待陀螺儀數據…';
            document.getElementById('copyLogBtn').onclick = () => navigator.clipboard.writeText(document.getElementById('logContent').innerText);
            document.getElementById('copyGyroBtn').onclick = () => navigator.clipboard.writeText(document.getElementById('gyroContent').innerText);
        };
    })();
</script>
